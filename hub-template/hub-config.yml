# repo-vitals hub configuration.
# List every repository to track — any repo with a vitals branch works,
# including repos you don't own (the hub reads public raw URLs, read-only).
# Simple YAML only: scalar keys and one flat list.

title: "My repo fleet"
# stale_after_days: 3    # watchdog threshold (default 3)
# branch: vitals         # data branch name (default vitals)
# site_url: "https://your-name.github.io/repo-vitals-hub"   # this hub's own
#   public URL. Optional — only needed to make the per-repo dashboard links
#   inside REPORT.md fully-qualified (so they still work if that file is
#   read raw or emailed standalone). Without it the links are root-relative,
#   which is correct whenever the site is browsed as a whole on Pages.

repos:
  - owner/repo-one
  - owner/repo-two
  # - other-org/their-repo
